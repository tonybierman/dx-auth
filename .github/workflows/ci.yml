name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # disabled for cache efficiency in CI
  RUST_BACKTRACE: short

jobs:
  # The gating job — must pass for a PR to merge.
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Provisions the toolchain pinned in rust-toolchain.toml (channel +
      # components + wasm target), so every job builds on the same compiler.
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      # Test the library crates. The `examples/dioxus-*` binaries pull in the
      # dioxus devtools stack which is slow to build and isn't what we're
      # testing. The single-axis examples (`*-authz-example`, `dioxus-rbac-example`)
      # additionally build their adapter WITHOUT `mail`, which can't be unified
      # into one workspace build alongside the `mail`-on fullstack examples (the
      # `AuthConfig::builder` arity differs by feature), so they're excluded here
      # and exercised in isolation instead.
      - name: Test workspace
        run: cargo test --workspace --exclude dioxus-fullstack-example --exclude dioxus-authz-example --exclude dioxus-rbac-example --exclude leptos-authz-example --exclude leptos-rbac-example
      # Doctests above compile/run the `//!`/`///` code examples (rust / no_run
      # fences; `ignore` blocks are skipped). This additionally fails the build
      # on an unresolved intra-doc link (`[`Foo`]` that points nowhere), which
      # rustdoc otherwise only warns about — the rustdoc-side counterpart to the
      # README link guard in the `readme` job.
      - name: Check intra-doc links resolve
        env:
          RUSTDOCFLAGS: -D rustdoc::broken_intra_doc_links
        run: cargo doc --no-deps --workspace --exclude dioxus-fullstack-example --exclude dioxus-authz-example --exclude dioxus-rbac-example --exclude leptos-fullstack-example --exclude leptos-authz-example --exclude leptos-rbac-example

  # Access control is gated by in-process integration tests in the adapter
  # crates (crates/arium-{dioxus,leptos}/tests/access_control.rs), which the
  # `test` job above runs as part of the workspace. They boot the real
  # install-layered router on an ephemeral port and assert the three phases the
  # old shell probe covered: anonymous denial, non-admin refusal on admin
  # endpoints, and per-user token-revoke isolation (IDOR).

  # Compile-check the realistic feature combos so a future refactor doesn't
  # silently break consumers who turn off `default-features`. Pure
  # `cargo check`, no test execution — fast. Covers both UI adapters: the
  # Dioxus adapter gates its server side on `server`, the Leptos adapter on
  # `ssr`, so the combos mirror each other under each crate's feature name.
  feature-matrix:
    name: check ${{ matrix.package }} ${{ matrix.features }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # arium-dioxus (server side gated on `server`)
          - { package: arium-dioxus, features: "server,sqlite" }
          - { package: arium-dioxus, features: "server,sqlite,oauth-github" }
          - { package: arium-dioxus, features: "server,sqlite,oauth-oidc" }
          - { package: arium-dioxus, features: "server,sqlite,oauth-google" }
          - { package: arium-dioxus, features: "server,sqlite,oauth-microsoft" }
          - { package: arium-dioxus, features: "server,sqlite,mfa,mail,ratelimit" }
          - { package: arium-dioxus, features: "server,sqlite,tokens" }
          - { package: arium-dioxus, features: "server,sqlite,ui,oauth-github,mfa,mail,ratelimit,tokens" }
          - { package: arium-dioxus, features: "server,postgres,oauth-github,oauth-google,oauth-microsoft,mfa,mail,ratelimit,tokens" }
          # arium-leptos (server side gated on `ssr`)
          - { package: arium-leptos, features: "ssr,sqlite" }
          - { package: arium-leptos, features: "ssr,sqlite,oauth-github" }
          - { package: arium-leptos, features: "ssr,sqlite,oauth-oidc" }
          - { package: arium-leptos, features: "ssr,sqlite,oauth-google" }
          - { package: arium-leptos, features: "ssr,sqlite,oauth-microsoft" }
          - { package: arium-leptos, features: "ssr,sqlite,mfa,mail,ratelimit" }
          - { package: arium-leptos, features: "ssr,sqlite,tokens" }
          - { package: arium-leptos, features: "ssr,sqlite,ui,oauth-github,mfa,mail,ratelimit,tokens" }
          - { package: arium-leptos, features: "ssr,postgres,oauth-github,oauth-google,oauth-microsoft,mfa,mail,ratelimit,tokens" }
          # arium-authz: the `lifecycle` default is dropped by --no-default-features,
          # so these explicitly cover both axes — lifecycle on/off × backend. The
          # lifecycle-off rows are the enforcement-only core (no sqlx surface),
          # which no other job compiles.
          - { package: arium-authz, features: "sqlite" }
          - { package: arium-authz, features: "postgres" }
          - { package: arium-authz, features: "lifecycle,sqlite" }
          - { package: arium-authz, features: "lifecycle,postgres" }
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      # GitHub Actions cache keys can't contain commas, and `matrix.features`
      # is comma-separated — feeding it straight into the key makes rust-cache
      # fail to restore (a red annotation on every combo, and no caching).
      # Sanitize commas to hyphens so each combo still gets its own cache.
      - name: Compute cache key
        id: cache_key
        env:
          FEATURES: ${{ matrix.features }}
        run: echo "key=features-${{ matrix.package }}-${FEATURES//,/-}" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ steps.cache_key.outputs.key }}
      - name: Check
        run: |
          cargo check \
            --package ${{ matrix.package }} \
            --no-default-features \
            --features "${{ matrix.features }}"

  # Client/wasm builds for both UI adapters. The test / feature-matrix jobs
  # only exercise the native (server) side; this compiles the browser side on
  # the wasm32 target — the Dioxus client build (no `server`) and the Leptos
  # `hydrate` build — so a change can't silently break hydration consumers.
  wasm:
    name: check wasm client builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - name: arium-leptos (hydrate)
        run: |
          cargo check --package arium-leptos \
            --target wasm32-unknown-unknown \
            --no-default-features \
            --features hydrate,ui,sqlite,oauth-github,oauth-google,oauth-microsoft,mfa,mail,ratelimit,tokens
      - name: arium-dioxus (client)
        run: |
          cargo check --package arium-dioxus \
            --target wasm32-unknown-unknown \
            --no-default-features \
            --features ui,sqlite,oauth-github,oauth-google,oauth-microsoft,mfa,mail,ratelimit,tokens

  # Run the wasm client-surface logic tests (tests/wasm_client.rs) in Node via
  # wasm-bindgen-test-runner — no browser. The `wasm` job above only *checks*
  # the client build; this proves the re-exported wire types actually serde
  # round-trip (and, for Leptos, that `friendly_server_error` runs) on wasm32.
  # The runner must match the `wasm-bindgen` crate version exactly, so we derive
  # it from the resolved graph instead of pinning it by hand — a wasm-bindgen
  # bump then needs no edit here.
  wasm-test:
    name: wasm client tests (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - name: Install matching wasm-bindgen-test-runner
        run: |
          wb_ver="$(cargo metadata --format-version 1 \
            | jq -r '[.packages[] | select(.name == "wasm-bindgen") | .version] | first')"
          echo "wasm-bindgen resolved to $wb_ver"
          cargo install --locked wasm-bindgen-cli --version "$wb_ver"
      - name: arium-leptos (hydrate)
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
        run: |
          cargo test --package arium-leptos \
            --target wasm32-unknown-unknown \
            --no-default-features \
            --features hydrate,ui,sqlite,oauth-github,oauth-google,oauth-microsoft,mfa,mail,ratelimit,tokens \
            --test wasm_client
      - name: arium-dioxus (client)
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
        run: |
          cargo test --package arium-dioxus \
            --target wasm32-unknown-unknown \
            --no-default-features \
            --features ui,sqlite,oauth-github,oauth-google,oauth-microsoft,mfa,mail,ratelimit,tokens \
            --test wasm_client

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      # Two passes:
      #   1. `--all-targets` with the default warning set, so tests and
      #      examples still go through clippy.
      #   2. `--lib` with security-leaning lints layered on. These lints
      #      (unwrap/expect/panic/indexing/arithmetic) are real DoS
      #      findings in an auth library's request paths — but they're
      #      noisy in test code where unwrap is idiomatic, so we scope
      #      them to the lib target only.
      - run: cargo clippy --workspace --exclude dioxus-fullstack-example --exclude dioxus-authz-example --exclude dioxus-rbac-example --exclude leptos-authz-example --exclude leptos-rbac-example --all-targets -- -D warnings
      - run: |
          cargo clippy --workspace --exclude dioxus-fullstack-example --exclude dioxus-authz-example --exclude dioxus-rbac-example --exclude leptos-authz-example --exclude leptos-rbac-example --lib -- \
            -D warnings \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            -W clippy::indexing_slicing \
            -W clippy::arithmetic_side_effects

  # RustSec advisory database check against Cargo.lock. New advisories
  # land outside our PRs, so the nightly workflow also runs this.
  #
  # We invoke cargo-audit directly rather than using rustsec/audit-check
  # — that action installs cargo-audit fine but then fails its own
  # `cargo audit --json --file ./Cargo.lock` step with "entity not
  # found", which looks like a cwd bug in the action itself.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tools
      - run: cargo install --locked cargo-audit
      - run: cargo audit

  # License / source / bans policy enforcement. Configured in deny.toml.
  # Gating: deny.toml is curated; a failure here means a new transitive
  # introduced a license / source we haven't reviewed.
  #
  # We deliberately skip the `advisories` check here — advisory triage
  # is owned by the dedicated `audit` job above, which uses cargo-audit
  # directly and honors the curated ignore list in `.cargo/audit.toml`.
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources
          arguments: --all-features

  # Unused dependency detection.
  unused-deps:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bnjbvr/cargo-machete@main

  # README drift guard. Each library crate's README is generated from its
  # `//!` doc comment by cargo-rdme; this fails if a doc-comment change wasn't
  # regenerated (`cargo rdme` in the crate, or `cargo rdme -w <crate>` from root).
  # arium-dioxus is held from publishing (git dep on dioxus-primitives) but is
  # checked here too so its README stays in sync and stays release-ready.
  readme:
    name: cargo rdme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tools
      - run: cargo install --locked cargo-rdme
      - name: Check READMEs are in sync with doc comments
        run: |
          for crate in arium arium-authz arium-dioxus arium-leptos arium-mcp arium-pool arium-wire; do
            echo "::group::cargo rdme --check -w $crate"
            cargo rdme --check -w "$crate"
            echo "::endgroup::"
          done
      - name: Guard against broken intra-doc links in generated READMEs
        run: |
          # cargo-rdme 1.5.0 copies crate-root //! intra-doc links verbatim into the
          # README without resolving them, so [`Foo`] and [`Foo`](bar::baz) render as
          # broken links on crates.io. The --check sync guard above won't catch it
          # (the README still "matches" the doc comment). Flag any backtick-wrapped
          # link text that isn't an explicit http(s):// URL.
          if broken=$(grep -rnoE '\[`[^`]+`\]\([^)]*\)|\[`[^`]+`\]' crates/*/README.md | grep -vE '\]\(https?://'); then
            echo "Broken intra-doc link(s) in generated README(s):"
            echo "$broken"
            echo "Fix: flatten the crate-root //! doc comment to plain code spans, then rerun cargo rdme -w <crate>."
            exit 1
          fi

  # Secret scan on the full repo. Gating: a hit here means a credential
  # is about to land in git history — that's worth blocking the merge.
  #
  # We invoke the gitleaks binary directly rather than gitleaks-action.
  # The action does a license check by calling GitHub's user API; for
  # personal accounts the call is intermittently flaky ("Bad credentials")
  # and the action then fails closed demanding a paid license. Direct
  # invocation avoids that entirely.
  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - run: gitleaks detect --source . --redact --verbose --no-banner
