name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # disabled for cache efficiency in CI
  RUST_BACKTRACE: short

jobs:
  # The gating job — must pass for a PR to merge.
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      # Restrict to the lib crate — `examples/basic` pulls in the dioxus
      # devtools stack which is slow to build and isn't what we're testing.
      - name: Test dx-auth
        run: cargo test --package dx-auth

  # Compile-check the realistic feature combos so a future refactor doesn't
  # silently break consumers who turn off `default-features`. Pure
  # `cargo check`, no test execution — fast.
  feature-matrix:
    name: check ${{ matrix.features }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "server,sqlite"
          - "server,sqlite,oauth-github"
          - "server,sqlite,mfa,mail,ratelimit"
          - "server,sqlite,tokens"
          - "server,sqlite,ui,oauth-github,mfa,mail,ratelimit,tokens"
          - "server,postgres,oauth-github,mfa,mail,ratelimit,tokens"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: features-${{ matrix.features }}
      - name: Check
        run: |
          cargo check \
            --package dx-auth \
            --no-default-features \
            --features "${{ matrix.features }}"

  # ---------------------------------------------------------------
  # Advisory jobs — don't gate merges yet. The repo isn't fmt/clippy-clean
  # today; flip `continue-on-error: false` once it is.
  # ---------------------------------------------------------------

  fmt:
    name: cargo fmt (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      # Security-leaning lints in addition to the default warning set.
      # Panics / unwraps / slicing in request paths are real DoS findings
      # for an auth crate.
      - run: |
          cargo clippy --package dx-auth --all-targets -- \
            -D warnings \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            -W clippy::indexing_slicing \
            -W clippy::integer_arithmetic

  # RustSec advisory database check against Cargo.lock. New advisories
  # land outside our PRs, so the nightly workflow also runs this.
  #
  # We invoke cargo-audit directly rather than using rustsec/audit-check
  # — that action installs cargo-audit fine but then fails its own
  # `cargo audit --json --file ./Cargo.lock` step with "entity not
  # found", which looks like a cwd bug in the action itself.
  audit:
    name: cargo audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tools
      - run: cargo install --locked cargo-audit
      - run: cargo audit

  # License / source / bans policy enforcement. Configured in deny.toml.
  # Gating: deny.toml is curated; a failure here means a new transitive
  # introduced a license / source we haven't reviewed.
  #
  # We deliberately skip the `advisories` check here — that category
  # tracks an upstream-controlled moving target, and gating on it would
  # mean any fresh advisory in the RustSec DB blocks every PR until
  # someone bumps a dep. Advisories are owned by the (advisory) `audit`
  # job below, which uses cargo-audit directly.
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources
          arguments: --all-features

  # Unused dependency detection.
  unused-deps:
    name: cargo machete (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@main

  # Secret scan on the diff for every PR, and full repo on push to main.
  # Free for personal/public repos; orgs need a GITLEAKS_LICENSE secret.
  # Gating: a hit here means a credential is about to land in git
  # history — that's worth blocking the merge to investigate.
  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
