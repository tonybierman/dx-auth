name: nightly

# Slow / advisory-only hardening jobs. These don't need to run on every
# PR — they exist to surface drift (new advisories, new outdated deps,
# new unsafe in the dep tree) on a schedule.
#
# All jobs are `continue-on-error: true` — this workflow's red badge is
# informational, not a merge gate.

on:
  schedule:
    # 04:00 UTC every day. New RustSec advisories land independently of
    # our PR cadence, so a daily heartbeat is the right cadence.
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # Re-run the advisory DB against Cargo.lock daily so a freshly-landed
  # advisory shows up here even when no PR is open. Direct cargo-audit
  # invocation — see the note on the matching ci.yml job for why we
  # don't use rustsec/audit-check.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - run: cargo install --locked cargo-audit
      - run: cargo audit

  # Surface deps that have a newer compatible release.
  outdated:
    name: cargo outdated
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - run: cargo install --locked cargo-outdated
      - run: cargo outdated --workspace --depth 1 --exit-code 0

  # Count unsafe in the dep tree. Useful to spot a new transitive that
  # pulled in a big block of unsafe code.
  geiger:
    name: cargo geiger
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - run: cargo install --locked cargo-geiger
      - run: cargo geiger --workspace --all-features

  # Full-history secret scan. Slower than the per-PR gitleaks step in
  # ci.yml — that one scans the diff, this one re-scans every commit so a
  # secret rotated into history doesn't slip past unnoticed.
  trufflehog:
    name: trufflehog (full history)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # Fuzz: not enabled yet — no fuzz targets exist in the repo.
  # When `cargo fuzz add wire_parse` (and friends) lands, uncomment this
  # and budget each target ~10–15 minutes.
  #
  # fuzz:
  #   name: cargo fuzz (time-budgeted)
  #   runs-on: ubuntu-latest
  #   continue-on-error: true
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       target: [wire_parse, oauth_callback]
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: dtolnay/rust-toolchain@nightly
  #     - run: cargo install --locked cargo-fuzz
  #     - run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=600

  # ZAP baseline against examples/dioxus-fullstack-example: not enabled yet — needs the
  # example to boot in CI with a known port + a seeded test user. Wire
  # that up (a `cargo run -p dioxus-fullstack-example &` step + readiness probe) before
  # uncommenting.
