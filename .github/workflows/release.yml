name: release

# Publishes the library crates to crates.io when a version tag is pushed.
#
# Lockstep release: tag the workspace version and every published crate goes
# out at that version, e.g.
#     git tag v0.1.0 && git push origin v0.1.0
# Crates go out in dependency order (wire -> pool -> authz -> engine -> leptos
# adapter); since Rust 1.66, `cargo publish` waits for each new version to
# appear in the index before returning, so the next crate's path->version
# resolution succeeds.
#
# Prerequisites (see the publishing plan, Steps 1-3):
#   - `publish = false` removed from the published crates,
#   - their intra-workspace deps carry a `version` (via [workspace.dependencies]),
#   - repo secret CARGO_REGISTRY_TOKEN holds a crates.io publish token.
#
# arium-dioxus is intentionally NOT published here — it's held until
# dioxus-primitives ships a usable release on crates.io.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # allow a manual run from the Actions tab

# Never let two publish runs overlap.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      # Dependency order: arium-wire and arium-pool (no internal deps) ->
      # arium-authz (deps wire + pool) -> arium (deps wire + pool + authz) ->
      # arium-leptos. arium depends on arium-pool and arium-authz, so both must
      # land on crates.io before arium's path->version resolution can succeed.
      # Each publish is idempotent: if that crate's version is already on
      # crates.io it's skipped rather than aborting the job, so a re-run (or a
      # run that resumes after a partial release) completes the remaining
      # crates instead of failing at the first already-published one.
      - name: cargo publish (lockstep, skip already-published)
        # pipefail so the pipeline reflects cargo's status, not tee's; the
        # publish call sits in an `if` condition, which errexit (bash -e)
        # deliberately ignores, so a non-zero "already uploaded" reaches the
        # skip branch instead of aborting the job.
        run: |
          set -eo pipefail
          # $1 = crate; remaining args pass through to `cargo publish` (e.g. a
          # backend feature for the verification build).
          publish() {
            local crate=$1; shift
            if cargo publish -p "$crate" "$@" 2>&1 | tee "/tmp/publish-$crate.log"; then
              echo "::notice::published $crate"
            elif grep -qiE "already (uploaded|exists)|is already uploaded" "/tmp/publish-$crate.log"; then
              echo "::notice::$crate already on crates.io at this version — skipping"
            else
              echo "::error::publish failed for $crate"; return 1
            fi
          }
          publish arium-wire
          # arium-pool and arium-authz declare no default backend (the consumer
          # picks one at the top of the tree), so `cargo publish`'s verification
          # build trips their "enable sqlite or postgres" compile_error. Pass a
          # backend for the verify build only — the published manifests are
          # unchanged, so consumers still choose their own backend.
          publish arium-pool --features sqlite
          publish arium-authz --features sqlite
          publish arium
          publish arium-leptos
