name: release

# Publishes the library crates to crates.io when a version tag is pushed.
#
# Lockstep release: tag the workspace version and all three crates publish at
# that version, e.g.
#     git tag v0.1.0 && git push origin v0.1.0
# Crates go out in dependency order (wire -> engine -> leptos adapter); since
# Rust 1.66, `cargo publish` waits for each new version to appear in the index
# before returning, so the next crate's path->version resolution succeeds.
#
# Prerequisites (see the publishing plan, Steps 1-3):
#   - `publish = false` removed from arium-wire / arium / arium-leptos,
#   - their intra-workspace deps carry a `version` (via [workspace.dependencies]),
#   - repo secret CARGO_REGISTRY_TOKEN holds a crates.io publish token.
#
# arium-dioxus is intentionally NOT published here — it's held until
# dioxus-primitives ships a usable release on crates.io.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # allow a manual run from the Actions tab

# Never let two publish runs overlap.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      # Dependency order: arium-wire (no internal deps) -> arium -> arium-leptos.
      # Each publish is idempotent: if that crate's version is already on
      # crates.io it's skipped rather than aborting the job, so a re-run (or a
      # run that resumes after a partial release) completes the remaining
      # crates instead of failing at the first already-published one.
      - name: cargo publish (lockstep, skip already-published)
        run: |
          publish() {
            local out status
            out=$(cargo publish -p "$1" 2>&1); status=$?
            echo "$out"
            if [ "$status" -eq 0 ]; then
              echo "::notice::published $1"
            elif echo "$out" | grep -qiE "already (uploaded|exists)|is already uploaded"; then
              echo "::notice::$1 already on crates.io at this version — skipping"
            else
              echo "::error::publish failed for $1"; return "$status"
            fi
          }
          publish arium-wire
          publish arium
          publish arium-leptos
