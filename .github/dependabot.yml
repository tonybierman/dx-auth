# Dependabot keeps the routine, compatible churn batched into a few reviewable
# PRs a week. CI (test + feature-matrix + wasm + clippy + audit + deny) is the
# gate on each one. Cargo.lock is committed, so Dependabot updates the locked
# versions (and widens a `^x.y` requirement only when the range can't admit the
# new release). It does NOT manage git dependencies (dioxus-primitives), which
# we pin by `rev` and bump by hand.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # The two UI frameworks get their own isolated PRs. A dioxus/leptos bump
      # is the one most likely to carry breaking changes (0.x minor = breaking),
      # so it should land on its own, separately reviewable, with the upstream
      # changelog in hand — never buried inside a batch of unrelated bumps.
      dioxus:
        patterns:
          - "dioxus"
          - "dioxus-*"
      leptos:
        patterns:
          - "leptos"
          - "leptos_*"
      # The sqlx + axum_session stack moves in lockstep and gates itself:
      # axum_session{,_auth,_sqlx} pin an exact sqlx version, so a sqlx
      # major bump that lands before the session crates catch up splits the
      # lockfile into two sqlx versions and won't compile. Isolate them in
      # one PR so that coupling is visible and reviewable on its own, instead
      # of a green serde_json bump masking a breaking sqlx jump.
      sqlx-session:
        patterns:
          - "sqlx"
          - "sqlx-*"
          - "axum_session"
          - "axum_session_*"
      # Everything else — the rest of the engine's backend crates (axum,
      # argon2, lettre, oauth2, reqwest, …) and small utilities — batched
      # together.
      rust-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "dioxus"
          - "dioxus-*"
          - "leptos"
          - "leptos_*"
          - "sqlx"
          - "sqlx-*"
          - "axum_session"
          - "axum_session_*"

  # Keep the workflow actions (checkout, rust-cache, cargo-deny, …) current too;
  # one grouped PR a week.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
