# cargo-audit policy. See https://docs.rs/cargo-audit/ for the full schema.
#
# Each ignored advisory MUST be justified inline so a future reviewer can
# re-evaluate. Strip the ignore once the upstream fix lands.

[advisories]
ignore = [
    # RUSTSEC-2023-0071 — Marvin Attack on rsa 0.9.x.
    #
    # Reaches arium's build graph only as:
    #
    #   rsa 0.9.10
    #   └── sqlx-mysql 0.8.6
    #       └── sqlx-macros-core 0.8.6
    #           └── sqlx-macros 0.8.6
    #               └── sqlx 0.8.6
    #                   ├── arium        (sqlite-only or postgres-only)
    #                   └── axum_session_sqlx
    #
    # sqlx-macros-core compiles every backend so the compile-time query
    # macros can verify offline against any of them. arium enables only
    # `sqlx/sqlite` (and optionally `sqlx/postgres`) at runtime — the
    # mysql backend, and therefore the vulnerable rsa code path, is never
    # linked into the deployed binary.
    #
    # No upstream fix exists yet (rsa 0.9.x is the current line). Recheck
    # monthly via the nightly `cargo audit` job; drop this ignore the
    # moment a fix ships. Tracked on standup board #4 card #38.
    "RUSTSEC-2023-0071",
]
